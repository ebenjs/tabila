spring.application.name=backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:h2:mem:tabila;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:change-me-please-change-me-please-change-me-please}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://192.168.1.2:5173,http://192.168.1.2:5174}
app.mail.from=${APP_MAIL_FROM:no-reply@tabila.local}
app.backoffice.url=${APP_BACKOFFICE_URL:http://localhost:5174}
