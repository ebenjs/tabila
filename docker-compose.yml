services:
  postgres:
    image: postgres:16-alpine
    container_name: tabila-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tabila
      POSTGRES_USER: tabila
      POSTGRES_PASSWORD: tabila
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - tabila_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabila -d tabila"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  tabila_postgres_data:
